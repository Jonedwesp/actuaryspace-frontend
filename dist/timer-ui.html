<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WorkFlow Timer</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      padding: 16px; 
      margin: 0; 
      color: #172b4d; 
      display: flex; 
      flex-direction: column; 
      gap: 12px; 
    }
    .btn { 
      border: none; 
      border-radius: 4px; 
      padding: 10px 12px; 
      font-weight: 600; 
      cursor: pointer; 
      font-size: 14px; 
      width: 100%; 
      transition: opacity 0.2s; 
    }
    .btn:hover { opacity: 0.9; }
    .btn-yellow { background-color: #f2d600; color: #172b4d; }
    .btn-red { background-color: #eb5a46; color: #fff; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .display { text-align: center; font-size: 18px; font-weight: 600; margin-bottom: 4px; transition: color 0.3s; }
    .loading { font-size: 14px; color: #5e6c84; text-align: center; margin-top: 20px; }
  </style>
</head>
<body>

  <div id="loader" class="loading">Connecting to ActuarySpace...</div>

  <div id="ui" style="display: none;">
    <div class="display" id="time-display">⏱ 0m</div>
    <button id="start-btn" class="btn btn-yellow" style="display: none;">Start WorkFlow</button>
    <button id="stop-btn" class="btn btn-red" style="display: none;">Stop WorkFlow</button>
  </div>

  <script>
    const t = window.TrelloPowerUp.iframe();
    let cardId = null;
    
    let workDurationTotal = 0; 
    let workDurationObj = {};
    let currentBucketName = "Inbox";
    let workTimerStart = null;
    let liveInterval = null;

    const loader = document.getElementById('loader');
    const ui = document.getElementById('ui');
    const display = document.getElementById('time-display');
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');

    function formatTime(totalMins) {
      if (isNaN(totalMins) || totalMins < 0) totalMins = 0;
      const m = Math.floor(totalMins);
      if (m < 60) return `${m}m`;
      
      const hours = Math.floor(m / 60);
      const mins = m % 60;
      return mins > 0 ? `${hours}h ${mins}m` : `${hours}h`; 
    }

    function extractVal(v) {
      if (v === null || v === undefined) return "";
      if (typeof v === "object") return v.text || v.number || v.value?.text || v.value?.number || "";
      return String(v);
    }

    async function init() {
      const card = await t.card('id');
      cardId = card.id;

      try {
        // ALWAYS grab the live Trello column name (e.g. "Siya - Review")
        const listData = await t.list('name');
        currentBucketName = listData.name || "Inbox";

        const res = await fetch('/.netlify/functions/trello');
        const data = await res.json();

        let foundCard = null;
        if (data.buckets) {
          for (const b of data.buckets) {
            const c = b.cards.find(x => x.id === cardId);
            if (c) { foundCard = c; break; }
          }
        }

        if (foundCard && foundCard.customFields) {
          // TARGET STRICTLY THE NEW FIELDS
          const rawDur = extractVal(foundCard.customFields["[SYSTEM]WorkDuration"] || foundCard.customFields["WorkDuration"]);
          const rawStart = extractVal(foundCard.customFields["[SYSTEM]WorkTimerStart"] || foundCard.customFields["WorkTimerStart"]);

          // PARSE JSON SAFELY
          if (rawDur.startsWith("{")) {
              try {
                  workDurationObj = JSON.parse(rawDur);
                  let sum = 0;
                  for (let key in workDurationObj) {
                     sum += parseFloat(workDurationObj[key]) || 0;
                  }
                  workDurationTotal = sum;
              } catch(e) {
                  workDurationTotal = 0;
                  workDurationObj = {};
              }
          } else {
              workDurationTotal = parseFloat(rawDur) || 0;
              workDurationObj = { [currentBucketName]: workDurationTotal };
          }
          if (isNaN(workDurationTotal) || workDurationTotal > 1000000) workDurationTotal = 0;

          // EXTRACT TICKING TIMESTAMP (Handles new 'timestamp|name' and old 'timestamp' format)
          if (rawStart.includes("|")) {
              const parts = rawStart.split("|");
              const startTs = parseFloat(parts[0]);
              currentBucketName = parts[1] || currentBucketName; // Lock context to where timer started
              if (startTs > 1000000000000) workTimerStart = startTs;
          } else {
              const startTs = parseFloat(rawStart);
              if (startTs > 1000000000000) workTimerStart = startTs;
          }

          // OFFLINE CATCHUP
          const offlineStr = localStorage.getItem(`offline_stop_${cardId}`);
          if (offlineStr && workTimerStart) {
            loader.style.display = 'block';
            loader.innerText = "Syncing offline time...";
            ui.style.display = 'none';
            
            const offlineData = JSON.parse(offlineStr);
            const sessionMins = Math.max(0, offlineData.stopTime - workTimerStart) / 1000 / 60;
            
            workDurationObj[currentBucketName] = (parseFloat(workDurationObj[currentBucketName]) || 0) + sessionMins;
            workDurationObj[currentBucketName] = parseFloat(workDurationObj[currentBucketName].toFixed(2));
            const recoveredTotalStr = JSON.stringify(workDurationObj);
            
            try {
               await setField('[SYSTEM]WorkDuration', recoveredTotalStr, null);
               await setField('[SYSTEM]WorkTimerStart', "", null);
               
               workDurationTotal += sessionMins;
               workTimerStart = null;
               localStorage.removeItem(`offline_stop_${cardId}`);
            } catch(syncErr) {
               console.warn("Still offline. Keeping local memory active.");
            }
          } else if (offlineStr && !workTimerStart) {
             localStorage.removeItem(`offline_stop_${cardId}`);
          }
        }
        render();
      } catch (err) {
        loader.innerText = "Network offline. Retrying...";
        console.error("Fetch error:", err);
      }
    }

    function render() {
      loader.style.display = 'none';
      ui.style.display = 'block';

      if (liveInterval) clearInterval(liveInterval);

      if (workTimerStart) {
        startBtn.style.display = 'none';
        stopBtn.style.display = 'block';
        updateLiveClock();
        liveInterval = setInterval(updateLiveClock, 1000);
      } else {
        startBtn.style.display = 'block';
        stopBtn.style.display = 'none';
        display.innerText = `⏱ ${formatTime(workDurationTotal)} logged`;
      }
      
      t.sizeTo('body');
    }

    function updateLiveClock() {
      if (!workTimerStart) return;
      const diffMs = Math.max(0, Date.now() - workTimerStart);
      const liveMins = diffMs / 1000 / 60;
      const total = workDurationTotal + liveMins;
      display.innerText = `⏱ ${formatTime(total)} (Recording)`;
    }

    async function setField(fieldName, valueText, valueNumber = null) {
      const res = await fetch('/.netlify/functions/trello-set-custom-field', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cardId, fieldName, valueText: String(valueText), valueNumber })
      });
      if (!res.ok) throw new Error("Network failed");
      return res;
    }

    startBtn.onclick = async () => {
      setLoadingState(true);
      const now = Date.now();
      // Locks the name of the column it is currently in
      const nowStr = `${now}|${currentBucketName}`; 

      try {
        await setField('[SYSTEM]WorkTimerStart', nowStr, null);
        workTimerStart = now;
        render();
      } catch (e) {
        alert('Network Offline: Could not start timer. Please check your connection.');
      }
      setLoadingState(false);
    }

    stopBtn.onclick = async () => {
      setLoadingState(true);
      const stopTime = Date.now();
      const sessionMins = (stopTime - workTimerStart) / 1000 / 60;
      
      // Saves the time to the specific list the card was in
      workDurationObj[currentBucketName] = (parseFloat(workDurationObj[currentBucketName]) || 0) + sessionMins;
      workDurationObj[currentBucketName] = parseFloat(workDurationObj[currentBucketName].toFixed(2));
      const newTotalStr = JSON.stringify(workDurationObj);

      try {
        await setField('[SYSTEM]WorkDuration', newTotalStr, null);
        await setField('[SYSTEM]WorkTimerStart', "", null);
        
        workDurationTotal += sessionMins;
        workTimerStart = null;
        render();
      } catch (e) {
        console.warn("Network failed, saving to local memory.");
        
        localStorage.setItem(`offline_stop_${cardId}`, JSON.stringify({ stopTime: stopTime }));
        
        workDurationTotal += sessionMins;
        workTimerStart = null;
        if (liveInterval) clearInterval(liveInterval);
        
        startBtn.style.display = 'block';
        stopBtn.style.display = 'none';
        
        display.innerText = `⏱ ${formatTime(workDurationTotal)}`;
        display.style.color = "#eb5a46";
        setTimeout(() => { 
            display.innerText = `⏱ ${formatTime(workDurationTotal)} (Saved Offline)`; 
        }, 100);
      }
      setLoadingState(false);
    }

    function setLoadingState(isLoading) {
      startBtn.disabled = isLoading;
      stopBtn.disabled = isLoading;
      startBtn.innerText = isLoading ? "Saving..." : "Start WorkFlow";
      stopBtn.innerText = isLoading ? "Saving..." : "Stop WorkFlow";
    }

    init();
  </script>
</body>
</html>
